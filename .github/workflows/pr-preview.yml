name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency: pr-preview-${{ github.event.number }}

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: github.event.action != 'closed'
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build (with PR subdirectory base)
        if: github.event.action != 'closed'
        run: npm run build
        env:
          # Vite reads this to set <base href> for assets — deploys to /pr-preview/pr-N/
          VITE_BASE_URL: /pr-preview/pr-${{ github.event.number }}/

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
