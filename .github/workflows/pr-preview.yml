name: PR Preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened, closed]

concurrency: pr-preview-${{ github.event.number }}

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        if: github.event.action != 'closed'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build (with PR subdirectory base)
        if: github.event.action != 'closed'
        run: npm run build
        env:
          VITE_BASE_URL: /pr-preview/pr-${{ github.event.number }}/

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
